<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>패파리그 EXAM — 시험 결과</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="header-brand">
        <div class="header-logo">P</div>
        <div>
          <h1 class="page-title">패파리그 <span>EXAM</span></h1>
          <p class="page-subtitle">시험 결과</p>
        </div>
      </div>
      <button type="button" onclick="localStorage.removeItem('pafa_student');sessionStorage.removeItem('pafa_student');localStorage.removeItem('pafa_result');sessionStorage.removeItem('pafa_result');location.href='index.html';" style="font-size:11px;padding:4px 10px;border:1px solid #ccc;border-radius:6px;background:transparent;color:#888;cursor:pointer">로그아웃</button>
    </header>

    <section class="card">
      <div class="result-summary">
        <div class="muted" id="result-student"></div>
        <div class="result-label" id="result-title"></div>
        <div class="result-score" id="result-score"></div>
        <div class="muted" id="result-rate-label"></div>
        <div class="progress-track">
          <div class="progress-fill" id="result-progress" style="width: 0%;"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px;">문항별 결과</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>번호</th>
              <th>내 답</th>
              <th>정답</th>
              <th>득점</th>
            </tr>
          </thead>
          <tbody id="result-table-body"></tbody>
        </table>
      </div>
    </section>

    <button type="button" class="btn btn-secondary" id="retry-button">다시 시험보기</button>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function () {
      const storedResult = localStorage.getItem('pafa_result') || sessionStorage.getItem('pafa_result');
      if (!storedResult) { window.location.href = 'index.html'; return; }

      const result = JSON.parse(storedResult);
      const percentage = result.max_score ? Math.round((result.total_score / result.max_score) * 100) : 0;

      function parseExamTitle(raw) {
        if (!raw) return raw;
        return raw
          .replace(/\.json$/i, '')
          .replace(/^패파리그_/, '')
          .replace(/_(최고난도|심화|고난도|기본)/g, '')
          .replace(/_[A-Z0-9]_동형등록$/i, '')
          .replace(/_동형등록$/i, '')
          .replace(/고([123])/, '$1학년')
          .replace(/_/g, ' ')
          .trim();
      }

      document.getElementById('result-student').textContent = `${result.student_name || ''} 학생`;
      document.getElementById('result-title').textContent = parseExamTitle(result.exam_title) || '시험';
      document.getElementById('result-score').textContent = `${percentage} / 100`;
      document.getElementById('result-rate-label').textContent = `정답률 ${percentage}%`;
      setTimeout(() => {
        document.getElementById('result-progress').style.width = `${percentage}%`;
      }, 100);

      const escHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // JSON 형태 정답(어법/어휘) → "① goes  ⑤ go" 표시
      function fmtAnswer(s) {
        if (!s) return '-';
        try {
          const obj = JSON.parse(s);
          if (typeof obj === 'object' && !Array.isArray(obj)) {
            return escHtml(Object.entries(obj).map(([k,v])=>`${k} ${v}`).join('  '));
          }
        } catch(_) {}
        return escHtml(s);
      }
      document.getElementById('result-table-body').innerHTML = (result.responses || [])
        .map((item) => {
          const wrong = item.score < item.max_score;
          const hasFeedback = item.feedback && item.feedback.trim();
          const hasExplain  = item.explain_text && item.explain_text.trim();
          const detailId = `detail-${item.question_no}`;
          // 해설/피드백 행 (오답이거나 피드백 있을 때만)
          const extraRow = (wrong && (hasFeedback || hasExplain)) ? `
            <tr id="${detailId}" style="display:none;background:var(--card-bg,#f8f9fb)">
              <td colspan="4" style="padding:10px 14px;font-size:12px;color:var(--text,#333);line-height:1.6;border-top:1px dashed var(--border,#e0e0e0)">
                ${hasFeedback ? `<div style="margin-bottom:6px"><strong style="color:var(--primary,#1a3a6b)">채점 피드백:</strong> ${escHtml(item.feedback)}</div>` : ''}
                ${hasExplain  ? `<div><strong style="color:var(--primary,#1a3a6b)">해설:</strong><br><span style="white-space:pre-wrap">${escHtml(item.explain_text)}</span></div>` : ''}
              </td>
            </tr>` : '';
          const toggleBtn = (wrong && (hasFeedback || hasExplain))
            ? `<button onclick="var r=document.getElementById('${detailId}');r.style.display=r.style.display==='none'?'table-row':'none'" style="font-size:10px;padding:1px 7px;border:1px solid #ccc;border-radius:4px;background:transparent;cursor:pointer;margin-left:6px">해설</button>`
            : '';
          return `
            <tr>
              <td>${item.question_no}</td>
              <td>${escHtml(item.answer) || '-'}</td>
              <td>${fmtAnswer(item.correct_answer)}</td>
              <td class="${item.score > 0 ? 'score-correct' : 'score-wrong'}">${item.score}<span style="color:var(--muted);font-weight:400">/${item.max_score ?? ''}</span>${toggleBtn}</td>
            </tr>${extraRow}`;
        })
        .join('');

      document.getElementById('retry-button').addEventListener('click', () => {
        window.location.href = 'exam.html';
      });
    })();
  </script>
<script>
(function(){
  const DEV_HOSTS = ['localhost','127.0.0.1','106.250.201.250',''];
  const isDebug = new URLSearchParams(location.search).get('debug') === '7958';
  if (DEV_HOSTS.includes(location.hostname) || isDebug || location.protocol === 'file:') return;
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) { e.preventDefault(); return false; }
    if (e.ctrlKey && ['u','U','s','S'].includes(e.key)) { e.preventDefault(); return false; }
  }, true);
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; }, true);
  let _dtOpen = false;
  setInterval(function() {
    const w = window.outerWidth - window.innerWidth > 160;
    const h = window.outerHeight - window.innerHeight > 160;
    if (w || h) { if (!_dtOpen) { _dtOpen = true; console.clear(); } } else { _dtOpen = false; }
  }, 1000);
  if (new URLSearchParams(location.search).get('debug') !== '7958') { console.log = () => {}; console.warn = () => {}; }
  document.addEventListener('dragstart', function(e) { e.preventDefault(); });
})();
</script>
</body>
</html>
