<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>패파리그 EXAM — 시험 응시</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="header-brand">
        <div class="header-logo">P</div>
        <div>
          <h1 class="page-title">패파리그 <span>EXAM</span></h1>
          <p class="page-subtitle" id="student-label"></p>
        </div>
      </div>
      <div id="timer-display" class="timer">50:00</div>
      <button type="button" onclick="if(confirm('로그아웃하시겠습니까?')){localStorage.removeItem('pafa_student');sessionStorage.removeItem('pafa_student');location.href='index.html';}" style="font-size:11px;padding:4px 10px;border:1px solid #ccc;border-radius:6px;background:transparent;color:#888;cursor:pointer">로그아웃</button>
    </header>

    <section class="card">
      <div class="status-banner">시험을 선택하면 50분 타이머가 즉시 시작됩니다.</div>
      <div id="exam-list"></div>
    </section>

    <div class="exam-body-layout" id="exam-body-layout" style="display:none">
      <section class="card question-main" id="question-section">
        <h2 style="font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px;">문항</h2>
        <div id="question-container"></div>
        <button type="button" id="submit-button" class="btn btn-gold" style="margin-top:8px;" disabled>제출하기</button>
      </section>

      <aside class="answer-sidebar" id="answer-sheet-section">
        <div class="card answer-sidebar-card">
          <h2 class="sidebar-title">답안 현황</h2>
          <div id="answer-sheet" class="answer-sheet"></div>
          <div id="timer-display-sub" style="margin-top:16px;text-align:center;font-size:22px;font-weight:800;letter-spacing:2px;color:var(--navy);font-family:monospace">—</div>
        </div>
      </aside>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/exam.js"></script>
  <script src="js/submit.js"></script>
  <script>
    (function () {
      const storedStudent = localStorage.getItem('pafa_student') || sessionStorage.getItem('pafa_student');
      if (!storedStudent) { window.location.href = 'index.html'; return; }

      const student = JSON.parse(storedStudent);
      document.getElementById('student-label').textContent = `${student.name || ''} 학생`;

      const submitButton = document.getElementById('submit-button');
      let currentAttemptId = '';
      let currentQuestions = [];
      let stopTimer = null;
      let hasSubmitted = false;

      async function handleSubmit() {
        if (!currentAttemptId || !currentQuestions.length || hasSubmitted) return;
        hasSubmitted = true;
        submitButton.disabled = true;
        try {
          await window.submitExam(currentAttemptId, currentQuestions);
        } catch (error) {
          hasSubmitted = false;
          submitButton.disabled = false;
          alert(error.message);
        }
      }

      async function startSelectedExam(exam) {
        const attempt = await window.api.apiPost('/student/attempts', {
          student_id: student.student_id,
          exam_id: exam.id,
        });
        currentAttemptId = attempt.attempt_id;
        const attemptData = await window.api.apiGet(`/student/attempts/${attempt.attempt_id}`, {});
        if (!Array.isArray(attemptData.questions) || attemptData.questions.length === 0) {
          alert('문항 데이터가 없는 시험입니다.');
          return;
        }
        currentQuestions = attemptData.questions;
        hasSubmitted = false;

        localStorage.setItem('pafa_answers', JSON.stringify({}));
        localStorage.setItem('pafa_current_exam', JSON.stringify({ exam_id: exam.id, title: exam.title }));

        document.getElementById('exam-body-layout').style.display = '';
        window.examApp.renderQuestions(currentQuestions);
        submitButton.disabled = false;
        localStorage.setItem('pafa_exam_started', String(Date.now()));

        if (typeof stopTimer === 'function') stopTimer();
        stopTimer = window.examApp.startTimer(50 * 60, handleSubmit);
      }

      submitButton.addEventListener('click', handleSubmit);

      window.api.apiGet('/student/exams', { student_id: student.student_id })
        .then((exams) => {
          window.examApp.renderExamList(exams, async (exam) => {
            // 응시 완료 → 결과 페이지로 이동
            if (exam.completed_attempt_id) {
              // #5 캐시 오염 방지: attempt_id 대조
              const cached = sessionStorage.getItem('pafa_result') || localStorage.getItem('pafa_result');
              if (cached) {
                try {
                  const parsed = JSON.parse(cached);
                  if (String(parsed.attempt_id) === String(exam.completed_attempt_id)) {
                    window.location.href = 'result.html';
                    return;
                  }
                } catch(_) {}
              }
              // 캐시 없거나 다른 시험 결과 → API 재조회
              try {
                // #2 IDOR: student_id 포함
                const detail = await window.api.apiGet(`/student/attempts/${exam.completed_attempt_id}/result`, { student_id: student.student_id });
                const store = JSON.stringify({ ...detail, attempt_id: exam.completed_attempt_id });
                try { localStorage.setItem('pafa_result', store); } catch(_) {}
                sessionStorage.setItem('pafa_result', store);
                window.location.href = 'result.html';
              } catch(_) { alert('결과를 불러올 수 없습니다.'); }
              return;
            }
            try { await startSelectedExam(exam); }
            catch (error) { alert(error.message); }
          });
        })
        .catch((error) => { alert(error.message); });
    })();
  </script>
<script>
(function(){
  const DEV_HOSTS = ['localhost','127.0.0.1','106.250.201.250',''];
  const isDebug = new URLSearchParams(location.search).get('debug') === '7958';
  if (DEV_HOSTS.includes(location.hostname) || isDebug || location.protocol === 'file:') return;
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) { e.preventDefault(); return false; }
    if (e.ctrlKey && ['u','U','s','S'].includes(e.key)) { e.preventDefault(); return false; }
  }, true);
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; }, true);
  let _dtOpen = false;
  setInterval(function() {
    const w = window.outerWidth - window.innerWidth > 160;
    const h = window.outerHeight - window.innerHeight > 160;
    if (w || h) { if (!_dtOpen) { _dtOpen = true; console.clear(); } } else { _dtOpen = false; }
  }, 1000);
  if (new URLSearchParams(location.search).get('debug') !== '7958') { console.log = () => {}; console.warn = () => {}; }
  document.addEventListener('dragstart', function(e) { e.preventDefault(); });
})();
</script>
</body>
</html>
